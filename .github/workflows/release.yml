name: Versioned Release

# Manual release workflow.
# This creates a human-readable release version from images already published to GHCR.
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, for example v0.1.0-demo"
        required: true
        type: string
      image_tag:
        description: "Existing commit SHA image tag to release"
        required: true
        type: string

# The workflow needs package write access to add version tags
# and contents write access to create the GitHub Release.
permissions:
  contents: write
  packages: write

# Prevent two release workflows from running at the same time.
concurrency:
  group: versioned-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Build the source and release image references from the workflow inputs.
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest

    outputs:
      release_version: ${{ steps.meta.outputs.release_version }}
      source_image_tag: ${{ steps.meta.outputs.source_image_tag }}
      target_app_source_image: ${{ steps.meta.outputs.target_app_source_image }}
      strix_ids_source_image: ${{ steps.meta.outputs.strix_ids_source_image }}
      traffic_generator_source_image: ${{ steps.meta.outputs.traffic_generator_source_image }}
      target_app_release_image: ${{ steps.meta.outputs.target_app_release_image }}
      strix_ids_release_image: ${{ steps.meta.outputs.strix_ids_release_image }}
      traffic_generator_release_image: ${{ steps.meta.outputs.traffic_generator_release_image }}

    steps:
      - name: Build release metadata
        id: meta
        shell: bash
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.release_version }}
          SOURCE_IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          RELEASE_VERSION="$RELEASE_VERSION_INPUT"
          SOURCE_IMAGE_TAG="$SOURCE_IMAGE_TAG_INPUT"

          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9_.-]+)?$ ]]; then
            echo "Invalid release version: $RELEASE_VERSION"
            echo "Expected format similar to v0.1.0 or v0.1.0-demo"
            exit 1
          fi

          if [[ ! "$SOURCE_IMAGE_TAG" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            echo "Invalid source image tag: $SOURCE_IMAGE_TAG"
            echo "Expected a full 40-character commit SHA"
            exit 1
          fi

          OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAMESPACE="${REGISTRY}/${OWNER_LC}/${REPO_LC}"

          TARGET_APP_SOURCE_IMAGE="${IMAGE_NAMESPACE}/target-app:${SOURCE_IMAGE_TAG}"
          STRIX_IDS_SOURCE_IMAGE="${IMAGE_NAMESPACE}/strix-ids:${SOURCE_IMAGE_TAG}"
          TRAFFIC_GENERATOR_SOURCE_IMAGE="${IMAGE_NAMESPACE}/traffic-generator:${SOURCE_IMAGE_TAG}"

          TARGET_APP_RELEASE_IMAGE="${IMAGE_NAMESPACE}/target-app:${RELEASE_VERSION}"
          STRIX_IDS_RELEASE_IMAGE="${IMAGE_NAMESPACE}/strix-ids:${RELEASE_VERSION}"
          TRAFFIC_GENERATOR_RELEASE_IMAGE="${IMAGE_NAMESPACE}/traffic-generator:${RELEASE_VERSION}"

          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "source_image_tag=${SOURCE_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          echo "target_app_source_image=${TARGET_APP_SOURCE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "strix_ids_source_image=${STRIX_IDS_SOURCE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "traffic_generator_source_image=${TRAFFIC_GENERATOR_SOURCE_IMAGE}" >> "$GITHUB_OUTPUT"

          echo "target_app_release_image=${TARGET_APP_RELEASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "strix_ids_release_image=${STRIX_IDS_RELEASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "traffic_generator_release_image=${TRAFFIC_GENERATOR_RELEASE_IMAGE}" >> "$GITHUB_OUTPUT"

          {
            echo "## Release metadata"
            echo ""
            echo "Release version: \`${RELEASE_VERSION}\`"
            echo "Source image tag: \`${SOURCE_IMAGE_TAG}\`"
            echo ""
            echo "### Source images"
            echo "- Target app: \`${TARGET_APP_SOURCE_IMAGE}\`"
            echo "- Strix IDS: \`${STRIX_IDS_SOURCE_IMAGE}\`"
            echo "- Traffic generator: \`${TRAFFIC_GENERATOR_SOURCE_IMAGE}\`"
            echo ""
            echo "### Release images"
            echo "- Target app: \`${TARGET_APP_RELEASE_IMAGE}\`"
            echo "- Strix IDS: \`${STRIX_IDS_RELEASE_IMAGE}\`"
            echo "- Traffic generator: \`${TRAFFIC_GENERATOR_RELEASE_IMAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Check that the source SHA-tagged images exist before creating release tags.
  validate-source-images:
    name: Validate source images
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Inspect source images
        env:
          TARGET_APP_SOURCE_IMAGE: ${{ needs.prepare.outputs.target_app_source_image }}
          STRIX_IDS_SOURCE_IMAGE: ${{ needs.prepare.outputs.strix_ids_source_image }}
          TRAFFIC_GENERATOR_SOURCE_IMAGE: ${{ needs.prepare.outputs.traffic_generator_source_image }}
        run: |
          docker buildx imagetools inspect "$TARGET_APP_SOURCE_IMAGE"
          docker buildx imagetools inspect "$STRIX_IDS_SOURCE_IMAGE"
          docker buildx imagetools inspect "$TRAFFIC_GENERATOR_SOURCE_IMAGE"

  # Add human-readable release tags to the existing published images.
  tag-release-images:
    name: Tag release images
    runs-on: ubuntu-latest
    needs:
      - prepare
      - validate-source-images

    steps:
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Create release image tags
        env:
          TARGET_APP_SOURCE_IMAGE: ${{ needs.prepare.outputs.target_app_source_image }}
          STRIX_IDS_SOURCE_IMAGE: ${{ needs.prepare.outputs.strix_ids_source_image }}
          TRAFFIC_GENERATOR_SOURCE_IMAGE: ${{ needs.prepare.outputs.traffic_generator_source_image }}
          TARGET_APP_RELEASE_IMAGE: ${{ needs.prepare.outputs.target_app_release_image }}
          STRIX_IDS_RELEASE_IMAGE: ${{ needs.prepare.outputs.strix_ids_release_image }}
          TRAFFIC_GENERATOR_RELEASE_IMAGE: ${{ needs.prepare.outputs.traffic_generator_release_image }}
        run: |
          docker buildx imagetools create \
            -t "$TARGET_APP_RELEASE_IMAGE" \
            "$TARGET_APP_SOURCE_IMAGE"

          docker buildx imagetools create \
            -t "$STRIX_IDS_RELEASE_IMAGE" \
            "$STRIX_IDS_SOURCE_IMAGE"

          docker buildx imagetools create \
            -t "$TRAFFIC_GENERATOR_RELEASE_IMAGE" \
            "$TRAFFIC_GENERATOR_SOURCE_IMAGE"

  # Create the GitHub Release and list the image references in the notes.
  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - tag-release-images

    steps:
      - name: Create release notes
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          SOURCE_IMAGE_TAG: ${{ needs.prepare.outputs.source_image_tag }}
          TARGET_APP_RELEASE_IMAGE: ${{ needs.prepare.outputs.target_app_release_image }}
          STRIX_IDS_RELEASE_IMAGE: ${{ needs.prepare.outputs.strix_ids_release_image }}
          TRAFFIC_GENERATOR_RELEASE_IMAGE: ${{ needs.prepare.outputs.traffic_generator_release_image }}
        run: |
          cat > release-notes.md <<EOF
          # Strix ${RELEASE_VERSION}

          This release marks a versioned image set for the Strix behaviour-based IDS prototype.

          ## Source image tag

          ${SOURCE_IMAGE_TAG}

          ## Versioned Docker images

          - ${TARGET_APP_RELEASE_IMAGE}
          - ${STRIX_IDS_RELEASE_IMAGE}
          - ${TRAFFIC_GENERATOR_RELEASE_IMAGE}

          ## Release notes

          This release does not rebuild the Docker images. The version tags are applied to the existing SHA-tagged images that were already built, scanned and published to GitHub Container Registry.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          SOURCE_IMAGE_TAG: ${{ needs.prepare.outputs.source_image_tag }}
        run: |
          gh release create "$RELEASE_VERSION" \
            --target "$SOURCE_IMAGE_TAG" \
            --title "Strix $RELEASE_VERSION" \
            --notes-file release-notes.md
