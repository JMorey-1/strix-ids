name: Environment Promotion Demo

# Manual promotion workflow.
# The image tag should match a SHA-tagged image already published to GHCR.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Commit SHA image tag to promote"
        required: true
        type: string

# Least-privilege permissions for reading the repo and pulling packages.
permissions:
  contents: read
  packages: read

# Prevent multiple promotion runs from overlapping.
concurrency:
  group: environment-promotion
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # Build the full set of image references from the supplied image tag.
  prepare:
    name: Prepare image references
    runs-on: ubuntu-latest

    outputs:
      target_app_image: ${{ steps.meta.outputs.target_app_image }}
      strix_ids_image: ${{ steps.meta.outputs.strix_ids_image }}
      traffic_generator_image: ${{ steps.meta.outputs.traffic_generator_image }}

    steps:
      - name: Build image references
        id: meta
        shell: bash
        env:
          PROMOTION_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          TAG="$PROMOTION_IMAGE_TAG"

          if [[ ! "$TAG" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid image tag: $TAG"
            exit 1
          fi

          OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAMESPACE="${REGISTRY}/${OWNER_LC}/${REPO_LC}"

          TARGET_APP_IMAGE="${IMAGE_NAMESPACE}/target-app:${TAG}"
          STRIX_IDS_IMAGE="${IMAGE_NAMESPACE}/strix-ids:${TAG}"
          TRAFFIC_GENERATOR_IMAGE="${IMAGE_NAMESPACE}/traffic-generator:${TAG}"

          echo "target_app_image=${TARGET_APP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "strix_ids_image=${STRIX_IDS_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "traffic_generator_image=${TRAFFIC_GENERATOR_IMAGE}" >> "$GITHUB_OUTPUT"

          {
            echo "## Promotion image set"
            echo ""
            echo "- Target app: \`${TARGET_APP_IMAGE}\`"
            echo "- Strix IDS: \`${STRIX_IDS_IMAGE}\`"
            echo "- Traffic generator: \`${TRAFFIC_GENERATOR_IMAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # Confirm that all three published images exist before promotion begins.
  validate-images:
    name: Validate published images
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Pull published images
        env:
          TARGET_APP_IMAGE: ${{ needs.prepare.outputs.target_app_image }}
          STRIX_IDS_IMAGE: ${{ needs.prepare.outputs.strix_ids_image }}
          TRAFFIC_GENERATOR_IMAGE: ${{ needs.prepare.outputs.traffic_generator_image }}
        run: |
          docker pull "$TARGET_APP_IMAGE"
          docker pull "$STRIX_IDS_IMAGE"
          docker pull "$TRAFFIC_GENERATOR_IMAGE"

  # Dev promotion runs first and performs the smoke checks.
  dev:
    name: Promote to dev
    runs-on: ubuntu-latest
    needs:
      - prepare
      - validate-images
    environment:
      name: dev

    steps:
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Run dev smoke checks
        env:
          TARGET_APP_IMAGE: ${{ needs.prepare.outputs.target_app_image }}
          STRIX_IDS_IMAGE: ${{ needs.prepare.outputs.strix_ids_image }}
          IDS_EVENT_URL: http://strix-ids:8081/events/request
        run: |
          cleanup() {
            docker rm -f strix-ids strix-target-app || true
            docker network rm strix-smoke || true
          }

          trap cleanup EXIT

          docker network create strix-smoke

          docker run -d \
            --name strix-ids \
            --network strix-smoke \
            -p 8081:8081 \
            -e SPRING_DATASOURCE_URL=jdbc:h2:mem:strix-smoke \
            "$STRIX_IDS_IMAGE"

          docker run -d \
            --name strix-target-app \
            --network strix-smoke \
            -p 8080:8080 \
            -e STRIX_IDS_URL="$IDS_EVENT_URL" \
            "$TARGET_APP_IMAGE"

          wait_for_url() {
            url="$1"

            for i in {1..30}; do
              if curl -fsS "$url" > /dev/null; then
                echo "Smoke check passed: $url"
                return 0
              fi

              sleep 2
            done

            echo "Timed out waiting for $url"
            docker logs strix-ids || true
            docker logs strix-target-app || true
            return 1
          }

          wait_for_url "http://localhost:8081/model/status"
          wait_for_url "http://localhost:8080/health"
          wait_for_url "http://localhost:8081/dashboard.html"

          curl -fsS "http://localhost:8080/products" > /dev/null
          sleep 2
          wait_for_url "http://localhost:8081/api/status"

      - name: Record dev promotion
        env:
          ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
          PROMOTION_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          {
            echo "## Dev promotion"
            echo ""
            echo "Environment: $ENVIRONMENT_NAME"
            echo "Image tag: $PROMOTION_IMAGE_TAG"
            echo "Smoke checks: passed"
          } >> "$GITHUB_STEP_SUMMARY"

  # Staging promotion uses the same image tag after dev has passed.
  staging:
    name: Promote to staging
    runs-on: ubuntu-latest
    needs:
      - prepare
      - dev
    environment:
      name: staging

    steps:
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Pull promoted image set
        env:
          TARGET_APP_IMAGE: ${{ needs.prepare.outputs.target_app_image }}
          STRIX_IDS_IMAGE: ${{ needs.prepare.outputs.strix_ids_image }}
          TRAFFIC_GENERATOR_IMAGE: ${{ needs.prepare.outputs.traffic_generator_image }}
        run: |
          docker pull "$TARGET_APP_IMAGE"
          docker pull "$STRIX_IDS_IMAGE"
          docker pull "$TRAFFIC_GENERATOR_IMAGE"

      - name: Record staging promotion
        env:
          ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
          PROMOTION_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          {
            echo "## Staging promotion"
            echo ""
            echo "Environment: $ENVIRONMENT_NAME"
            echo "Image tag: $PROMOTION_IMAGE_TAG"
            echo "Status: approved and promoted"
          } >> "$GITHUB_STEP_SUMMARY"

  # Production promotion is the final controlled stage.
  production:
    name: Promote to production
    runs-on: ubuntu-latest
    needs:
      - prepare
      - staging
    environment:
      name: production

    steps:
      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Pull promoted image set
        env:
          TARGET_APP_IMAGE: ${{ needs.prepare.outputs.target_app_image }}
          STRIX_IDS_IMAGE: ${{ needs.prepare.outputs.strix_ids_image }}
          TRAFFIC_GENERATOR_IMAGE: ${{ needs.prepare.outputs.traffic_generator_image }}
        run: |
          docker pull "$TARGET_APP_IMAGE"
          docker pull "$STRIX_IDS_IMAGE"
          docker pull "$TRAFFIC_GENERATOR_IMAGE"

      - name: Record production promotion
        env:
          ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
          PROMOTION_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          {
            echo "## Production promotion"
            echo ""
            echo "Environment: $ENVIRONMENT_NAME"
            echo "Image tag: $PROMOTION_IMAGE_TAG"
            echo "Status: approved and promoted"
          } >> "$GITHUB_STEP_SUMMARY"
