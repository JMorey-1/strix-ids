name: Azure Container Apps Deploy

# Manual Azure deployment workflow.
# This deploys existing GHCR images to Azure Container Apps.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing commit SHA image tag to deploy. Leave blank to use the current main commit SHA."
        required: false
        default: ""
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest

    # OIDC login requires id-token write permission.
    # contents read is enough for repository metadata.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Prepare deployment metadata
        id: meta
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          if [[ -z "$IMAGE_TAG_INPUT" ]]; then
            IMAGE_TAG="$GITHUB_SHA"
          else
            IMAGE_TAG="$IMAGE_TAG_INPUT"
          fi

          if [[ ! "$IMAGE_TAG" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            echo "Invalid image tag: $IMAGE_TAG"
            echo "Expected a full 40-character commit SHA"
            exit 1
          fi

          OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAMESPACE="${REGISTRY}/${OWNER_LC}/${REPO_LC}"

          IDS_IMAGE="${IMAGE_NAMESPACE}/strix-ids:${IMAGE_TAG}"
          TARGET_APP_IMAGE="${IMAGE_NAMESPACE}/target-app:${IMAGE_TAG}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "ids_image=${IDS_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "target_app_image=${TARGET_APP_IMAGE}" >> "$GITHUB_OUTPUT"

          {
            echo "## Azure deployment metadata"
            echo ""
            echo "Image tag: \`${IMAGE_TAG}\`"
            echo ""
            echo "### Images"
            echo "- Strix IDS: \`${IDS_IMAGE}\`"
            echo "- Target app: \`${TARGET_APP_IMAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate published images
        env:
          IDS_IMAGE: ${{ steps.meta.outputs.ids_image }}
          TARGET_APP_IMAGE: ${{ steps.meta.outputs.target_app_image }}
        run: |
          docker buildx imagetools inspect "$IDS_IMAGE"
          docker buildx imagetools inspect "$TARGET_APP_IMAGE"

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure GHCR registry access
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_IDS_APP_NAME: ${{ vars.AZURE_IDS_APP_NAME }}
          AZURE_TARGET_APP_NAME: ${{ vars.AZURE_TARGET_APP_NAME }}
        run: |
          az containerapp registry set \
            --name "$AZURE_IDS_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server ghcr.io

          az containerapp registry set \
            --name "$AZURE_TARGET_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server ghcr.io

      - name: Deploy Strix IDS
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_IDS_APP_NAME: ${{ vars.AZURE_IDS_APP_NAME }}
          IDS_IMAGE: ${{ steps.meta.outputs.ids_image }}
        run: |
          az containerapp update \
            --name "$AZURE_IDS_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IDS_IMAGE" \
            --set-env-vars SPRING_DATASOURCE_URL=jdbc:h2:mem:strix-azure

          az containerapp ingress enable \
            --name "$AZURE_IDS_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type external \
            --target-port 8081 \
            --transport auto

      - name: Resolve IDS URL
        id: ids
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_IDS_APP_NAME: ${{ vars.AZURE_IDS_APP_NAME }}
        run: |
          IDS_FQDN=$(az containerapp show \
            --name "$AZURE_IDS_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          IDS_URL="https://${IDS_FQDN}"
          IDS_EVENT_URL="${IDS_URL}/events/request"

          echo "ids_url=${IDS_URL}" >> "$GITHUB_OUTPUT"
          echo "ids_event_url=${IDS_EVENT_URL}" >> "$GITHUB_OUTPUT"

          echo "IDS URL: ${IDS_URL}"

      - name: Deploy target app
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_TARGET_APP_NAME: ${{ vars.AZURE_TARGET_APP_NAME }}
          TARGET_APP_IMAGE: ${{ steps.meta.outputs.target_app_image }}
          IDS_EVENT_URL: ${{ steps.ids.outputs.ids_event_url }}
        run: |
          az containerapp update \
            --name "$AZURE_TARGET_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$TARGET_APP_IMAGE" \
            --set-env-vars STRIX_IDS_URL="$IDS_EVENT_URL"

          az containerapp ingress enable \
            --name "$AZURE_TARGET_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type external \
            --target-port 8080 \
            --transport auto

      - name: Resolve target app URL
        id: target
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_TARGET_APP_NAME: ${{ vars.AZURE_TARGET_APP_NAME }}
        run: |
          TARGET_APP_FQDN=$(az containerapp show \
            --name "$AZURE_TARGET_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          TARGET_APP_URL="https://${TARGET_APP_FQDN}"

          echo "target_app_url=${TARGET_APP_URL}" >> "$GITHUB_OUTPUT"

          echo "Target app URL: ${TARGET_APP_URL}"

      - name: Run Azure smoke checks
        env:
          IDS_URL: ${{ steps.ids.outputs.ids_url }}
          TARGET_APP_URL: ${{ steps.target.outputs.target_app_url }}
        run: |
          wait_for_url() {
            url="$1"

            for i in {1..60}; do
              if curl -fsS "$url" > /dev/null; then
                echo "Smoke check passed: $url"
                return 0
              fi

              sleep 5
            done

            echo "Timed out waiting for $url"
            return 1
          }

          wait_for_url "${IDS_URL}/model/status"
          wait_for_url "${IDS_URL}/dashboard.html"
          wait_for_url "${IDS_URL}/api/status"

          wait_for_url "${TARGET_APP_URL}/health"
          wait_for_url "${TARGET_APP_URL}/products"

          curl -fsS "${TARGET_APP_URL}/products" > /dev/null
          sleep 3
          wait_for_url "${IDS_URL}/api/status"

      - name: Record Azure deployment
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          IDS_IMAGE: ${{ steps.meta.outputs.ids_image }}
          TARGET_APP_IMAGE: ${{ steps.meta.outputs.target_app_image }}
          IDS_URL: ${{ steps.ids.outputs.ids_url }}
          TARGET_APP_URL: ${{ steps.target.outputs.target_app_url }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINERAPPS_ENVIRONMENT: ${{ vars.AZURE_CONTAINERAPPS_ENVIRONMENT }}
        run: |
          {
            echo "## Azure deployment"
            echo ""
            echo "Status: passed"
            echo ""
            echo "Resource group: \`${AZURE_RESOURCE_GROUP}\`"
            echo "Container Apps environment: \`${AZURE_CONTAINERAPPS_ENVIRONMENT}\`"
            echo "Image tag: \`${IMAGE_TAG}\`"
            echo ""
            echo "### Deployed images"
            echo "- Strix IDS: \`${IDS_IMAGE}\`"
            echo "- Target app: \`${TARGET_APP_IMAGE}\`"
            echo ""
            echo "### Deployed URLs"
            echo "- Strix IDS: ${IDS_URL}"
            echo "- Target app: ${TARGET_APP_URL}"
            echo ""
            echo "Smoke checks: passed"
          } >> "$GITHUB_STEP_SUMMARY"
