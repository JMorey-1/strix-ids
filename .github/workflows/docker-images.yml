name: Docker Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-scan-publish:
    name: Build, scan and publish images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: target-app
            dockerfile: target-app/Dockerfile
            report_name: target-app
          - name: strix-ids
            dockerfile: strix-ids/Dockerfile
            report_name: strix-ids
          - name: traffic-generator
            dockerfile: traffic-generator/Dockerfile
            report_name: traffic-generator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${REGISTRY}/${OWNER_LC}/${REPO_LC}/${{ matrix.image.name }}"
          IMAGE_TAG="${IMAGE_NAME}:${GITHUB_SHA}"

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          echo "Image name: ${IMAGE_NAME}"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Build Docker image
        run: |
          docker build \
            -f "${{ matrix.image.dockerfile }}" \
            -t "${{ steps.meta.outputs.image_tag }}" \
            .

      - name: Run Trivy image scan report
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_tag }}
          format: table
          output: trivy-${{ matrix.image.report_name }}.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_tag }}
          format: spdx-json
          output: sbom-${{ matrix.image.report_name }}.spdx.json
          exit-code: 0

      - name: Upload image security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-security-${{ matrix.image.report_name }}
          path: |
            trivy-${{ matrix.image.report_name }}.txt
            sbom-${{ matrix.image.report_name }}.spdx.json

      - name: Enforce Trivy image gate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ steps.meta.outputs.image_tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${{ steps.meta.outputs.image_tag }}"
