services:
  strix-ids:
    image: ghcr.io/jmorey-1/strix-ids/strix-ids:${IMAGE_TAG}
    container_name: strix-ids
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/strix-db
    volumes:
      - strix_ids_data:/app/data

  target-app:
    image: ghcr.io/jmorey-1/strix-ids/target-app:${IMAGE_TAG}
    container_name: strix-target-app
    ports:
      - "8080:8080"
    environment:
      STRIX_IDS_URL: http://strix-ids:8081/events/request
    depends_on:
      - strix-ids

  traffic-generator:
    image: ghcr.io/jmorey-1/strix-ids/traffic-generator:${IMAGE_TAG}
    container_name: strix-traffic-generator
    environment:
      STRIX_TARGET_BASE_URL: http://target-app:8080
      STRIX_IDS_BASE_URL: http://strix-ids:8081
    depends_on:
      - target-app
      - strix-ids
    profiles:
      - generator

volumes:
  strix_ids_data:
