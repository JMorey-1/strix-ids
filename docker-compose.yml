services:
  strix-ids:
    build:
      context: .
      dockerfile: strix-ids/Dockerfile
    image: strix-ids:local
    container_name: strix-ids
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/strix-db
    volumes:
      - strix_ids_data:/app/data

  target-app:
    build:
      context: .
      dockerfile: target-app/Dockerfile
    image: strix-target-app:local
    container_name: strix-target-app
    ports:
      - "8080:8080"
    environment:
      STRIX_IDS_URL: http://strix-ids:8081/events/request
    depends_on:
      - strix-ids

  traffic-generator:
    build:
      context: .
      dockerfile: traffic-generator/Dockerfile
    image: strix-traffic-generator:local
    container_name: strix-traffic-generator
    environment:
      STRIX_TARGET_BASE_URL: http://target-app:8080
      STRIX_IDS_BASE_URL: http://strix-ids:8081
    depends_on:
      - target-app
      - strix-ids
    profiles:
      - generator

volumes:
  strix_ids_data:
